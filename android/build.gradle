buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

allprojects {
    repositories {
        maven {
            url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
        google()
        mavenCentral()
    }
}

gradle.projectsEvaluated {
    def nitroProject = findProject(":react-native-nitro-modules")
    def visionCameraProject = findProject(":react-native-vision-camera")
    def faceDetectorProject = findProject(":react-native-vision-camera-face-detector")

    if (nitroProject != null && visionCameraProject != null && faceDetectorProject != null) {
        def prepareNitroHeaders = nitroProject.tasks.named("prepareHeaders")
        def prepareVisionCameraHeaders = visionCameraProject.tasks.named("prepareHeaders")
        def nitroCleanTasks = nitroProject.tasks.matching {
            it.name == "clean" || it.name.startsWith("externalNativeBuildClean")
        }
        def visionCameraCleanTasks = visionCameraProject.tasks.matching {
            it.name == "clean" || it.name.startsWith("externalNativeBuildClean")
        }

        faceDetectorProject.tasks.matching {
            it.name.startsWith("externalNativeBuildClean")
        }.configureEach { task ->
            task.dependsOn(prepareNitroHeaders)
            task.dependsOn(prepareVisionCameraHeaders)
            task.enabled = false
            nitroCleanTasks.configureEach { nitroCleanTask ->
                task.mustRunAfter(nitroCleanTask)
            }
            visionCameraCleanTasks.configureEach { visionCameraCleanTask ->
                task.mustRunAfter(visionCameraCleanTask)
            }
        }

        faceDetectorProject.tasks.named("clean").configure { task ->
            task.doLast {
                delete(new File(faceDetectorProject.projectDir, ".cxx"))
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
